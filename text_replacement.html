<!-- this is inspiration for how i would like to see text updated in the question game program -->

<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: monospace;
    font-size: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
</style>
</head>
<body>

<div>
  the chicken barks at the <span id="word"></span>
</div>

<script>
const words = ["moon", "sun", "sky", "stars", "void"];
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%^&*";

let index = 0;
const el = document.getElementById("word");

function scrambleTo(target) {
  let iterations = 0;

  const interval = setInterval(() => {
    el.textContent = target
      .split("")
      .map((char, i) => {
        if (i < iterations) return target[i];
        return chars[Math.floor(Math.random() * chars.length)];
      })
      .join("");

    if (iterations >= target.length) {
      clearInterval(interval);
    }

    iterations += 0.5;
  }, 30);
}

function loop() {
  scrambleTo(words[index]);
  index = (index + 1) % words.length;
}

loop();
setInterval(loop, 500);
</script>

</body>
</html>
