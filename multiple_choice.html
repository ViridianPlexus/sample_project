 <script>
let nouns = [];

async function loadWords() {
  const res = await fetch("wordnet.json");
  nouns = await res.json();

  loadProgress();
  nextWord();
}

function saveProgress() {
  try {
    const filtered = nouns
      .filter(w => w.correct > 0 || w.wrong > 0)
      .map(w => ({
        word: w.word,
        correct: w.correct,
        wrong: w.wrong,
        score: w.score,
        difficulty: w.difficulty
      }));

    localStorage.setItem("wordGameData", JSON.stringify(filtered));
  } catch (e) {
    console.warn("Storage full, skipping save");
  }
}

function pickWord() {
  const weights = nouns.map(w => {
    const mastery = w.correct - w.wrong;
    return 1 / (1 + mastery + w.difficulty);
  });

  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;

  for (let i = 0; i < nouns.length; i++) {
    r -= weights[i];
    if (r <= 0) return nouns[i];
  }

  return nouns[0];
}

function loadProgress() {
  const saved = localStorage.getItem("wordGameData");
  if (!saved) return;

  const parsed = JSON.parse(saved);

  nouns.forEach((word, i) => {
    const match = parsed.find(p => p.word === word.word);
    if (match) nouns[i] = match;
  });
}

let currentWord = null;
let wrongAttempts = 0;

const prompt = document.getElementById("prompt");
const choices = document.getElementById("choices");
const status = document.getElementById("status");

function makeQuestion(def, word) {
  return def.replace(new RegExp(word, "gi"), "_____");
}

/* 🔥 generate multiple choice answers */
function generateChoices(correctWord) {
  const options = new Set();
  options.add(correctWord);

  while (options.size < 4) {
    const random = nouns[Math.floor(Math.random() * nouns.length)].word;
    options.add(random);
  }

  return Array.from(options).sort(() => Math.random() - 0.5);
}

function renderChoices(options) {
  choices.innerHTML = "";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;

    btn.style = `
      display:block;
      width:100%;
      margin:8px 0;
      padding:10px;
      font-size:16px;
      background:black;
      border:1px solid #FC1212;
      color:#FC1212;
      cursor:pointer;
    `;

    btn.onclick = () => checkAnswer(opt);
    choices.appendChild(btn);
  });
}

function nextWord() {
  currentWord = pickWord();
  wrongAttempts = 0;

  prompt.textContent = makeQuestion(
    currentWord.defs.join(" "),
    currentWord.word
  );

  status.textContent = "";

  const options = generateChoices(currentWord.word);
  renderChoices(options);
}

function checkAnswer(val) {
  if (val.toUpperCase() === currentWord.word.toUpperCase()) {

    currentWord.correct++;
    currentWord.score += 1 / currentWord.difficulty;
    currentWord.difficulty *= 1.05;

    status.textContent = "✔ CORRECT";
    saveProgress();

    setTimeout(nextWord, 800);

  } else {

    wrongAttempts++;

    currentWord.wrong++;
    currentWord.score -= 1;
    currentWord.difficulty *= 0.90;

    if (wrongAttempts >= 3) {
      status.textContent = `✖ WRONG (3x) — answer: ${currentWord.word}`;
      saveProgress();
      setTimeout(nextWord, 1200);
    } else {
      status.textContent = `✖ WRONG (${wrongAttempts}/3)`;
    }
  }
}

window.addEventListener("DOMContentLoaded", loadWords);
</script>
